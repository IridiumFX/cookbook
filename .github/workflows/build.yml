name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset default
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cookbook-linux
          path: build/libcookbook.so

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset default
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cookbook-macos
          path: build/libcookbook.dylib

  freebsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          run: |
            pkg install -y cmake ninja
            cmake --preset default
            cmake --build build
            ctest --test-dir build --output-on-failure

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -DBUILD_SHARED_LIBS=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        shell: pwsh
        run: |
          $env:PATH = "$PWD\build\bin\Release;" + $env:PATH
          .\build\bin\Release\cookbook_test.exe
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cookbook-windows
          path: |
            build/bin/Release/cookbook.dll
            build/Release/cookbook.lib
